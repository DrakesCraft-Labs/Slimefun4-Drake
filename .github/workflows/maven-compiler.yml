name: Java CI

on:
  push:
    branches:
    - main
    paths:
    - 'build-parent/**'
    - '.github/workflows/**'
    - 'src/**'
    - 'pom.xml'
  pull_request:
    paths:
    - 'build-parent/**'
    - '.github/workflows/**'
    - 'src/**'
    - 'pom.xml'
    - 'CHANGELOG.md'

permissions:
  contents: read

jobs:
  build:

    name: Maven build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4.0.0
      with:
        distribution: 'adopt'
        java-version: '21'
        java-package: jdk
        architecture: x64

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build production JAR for Paper 1.21.11
      run: mvn package --file pom.xml -DskipTests

    - name: Run legacy MockBukkit tests
      run: mvn test --file pom.xml -DlegacyMockBukkitTests

    - name: Upload production artifact
      uses: actions/upload-artifact@v4
      with:
        name: slimefun-core-${{ github.sha }}
        path: 'target/Slimefun-1.2.DEV v11.0-Drake-1.21.11-SNAPSHOT.jar'
