name: Pull Request

on:
  pull_request:
    paths:
    - 'build-parent/**'
    - '.github/workflows/**'
    - 'src/**'
    - 'pom.xml'

permissions:
  contents: read

jobs:
  setup-preview-build:
    name: Preview build
    runs-on: ubuntu-latest
    outputs:
     short-commit-hash: ${{ steps.env-setup.outputs.SHORT_COMMIT_HASH }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4.0.0
      with:
        distribution: 'adopt'
        java-version: '21'
        java-package: jdk
        architecture: x64

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - id: env-setup
      run: |
        SHORT_COMMIT_HASH=$(git rev-parse --short=8 ${{ github.sha }})
        echo "SHORT_COMMIT_HASH=$SHORT_COMMIT_HASH" >> "$GITHUB_ENV"
        echo "SHORT_COMMIT_HASH=$SHORT_COMMIT_HASH" >> "$GITHUB_OUTPUT"

    - name: Build production JAR for Paper 1.21.11
      run: mvn package -DskipTests

    - name: Run legacy MockBukkit tests
      run: mvn test -DlegacyMockBukkitTests

    - name: Upload the artifact
      uses: actions/upload-artifact@v4
      with:
        name: slimefun-${{ github.event.number }}-${{ env.SHORT_COMMIT_HASH }}
        path: 'target/Slimefun-1.2.DEV v11.0-Drake-1.21.11-SNAPSHOT.jar'

  call-workflows:
    needs: [setup-preview-build]
    uses: ./.github/workflows/e2e-testing.yml
    with:
      artifact-name: slimefun-${{ github.event.number }}-${{ needs.setup-preview-build.outputs.short-commit-hash }}
