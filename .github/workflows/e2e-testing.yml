name: End to End Testing

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Slimefun artifact name'
        required: true
        type: string

jobs:
  e2e-testing:
    name: End to End Testing
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      matrix:
        include:
          - mcVersion: '1.21.11'
            javaVersion: '21'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4.0.0
        with:
          distribution: temurin
          java-version: ${{ matrix.javaVersion }}
          java-package: jdk
          architecture: x64

      - name: Setup server
        run: |
          echo 'eula=true' > eula.txt
          mkdir plugins

      - name: Download ${{ matrix.mcVersion }} Paper
        run: |
          VERSION="${{ matrix.mcVersion }}"
          USER_AGENT="DrakesCraft-Core-CI/1.0 (https://github.com/DrakesCraft-Labs/Slimefun4-Drake)"
          BUILDS=$(curl -fsSL -H "User-Agent: $USER_AGENT" \
            "https://fill.papermc.io/v3/projects/paper/versions/$VERSION/builds")
          PAPER_URL=$(echo "$BUILDS" \
            | jq -r 'first(.[] | select(.channel == "STABLE") | .downloads."server:default".url) // empty')

          if [ -z "$PAPER_URL" ]; then
            echo "No stable Paper build is available for $VERSION" >&2
            exit 1
          fi

          curl -fsSL -H "User-Agent: $USER_AGENT" -o paper.jar "$PAPER_URL"
          jar --list --file paper.jar >/dev/null

      - name: Download Slimefun
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: plugins/

      - name: Download e2e-tester
        run: |
          curl -o e2e-tester.jar https://preview-builds.walshy.dev/download/e2e-tester/main/latest
          mv e2e-tester.jar plugins/e2e-tester.jar

      - name: Run server
        run: |
          java -jar paper.jar --nogui
